services:

  app:
    build: .

    container_name: tusayo-app

    ports:
      - "8081:80"

    volumes:
      - .:/var/www/html

    depends_on:
      - mysql

  mysql:
    image: mysql:8.4

    container_name: tusayo-mysql

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db_tusayo
      MYSQL_USER: tusayo
      MYSQL_PASSWORD: tusayo123

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin

    container_name: tusayo-pma

    restart: always

    environment:
      PMA_HOST: mysql

    ports:
      - "8082:80"

    depends_on:
      - mysql

volumes:
  mysql_data: